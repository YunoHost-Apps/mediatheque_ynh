; Variables d’environnement pour l’application (Moncine / Médiathèque — voir lib/config.php)

env[MONCINE_DATA_PATH] = __DATA_DIR__
env[MONCINE_MEDIA_PATH] = __DATA_DIR__/media
env[MONCINE_BASE_URL] = https://__DOMAIN____PATH__
env[MONCINE_TRUST_PROXY] = 1
env[MONCINE_MAIL_FROM] = mediatheque@__DOMAIN__

; PDF magazines (jusqu’à 350 Mo côté app) — ces lignes écrasent le modèle YunoHost si besoin.
php_admin_value[upload_max_filesize] = 400M
php_admin_value[post_max_size] = 400M
php_admin_value[memory_limit] = 512M
