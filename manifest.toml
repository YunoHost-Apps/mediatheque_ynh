#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "mediatheque"
name = "Médiathèque"
description.fr = "Médiathèque personnelle : films, envies, magazines, jeux vidéo, livres, BD…"
description.en = "Personal media library: movies, wishlist, magazines, video games, books, comics…"

version = "0.7.8~ynh1"

maintainers = ["Stéphane MATER"]

[upstream]
license = "GPL-3.0-or-later"
code = "https://github.com/daryl40000/mediatheque"

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
architectures = "all"
multi_instance = true
ldap = false
sso = false
disk = "300M"
ram.build = "50M"
ram.runtime = "100M"

[install]

    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/daryl40000/mediatheque/archive/refs/tags/0.7.8.tar.gz"
    sha256 = "d587f0fa84f8ff8df421a8b33d32d90f20e6a83e7337c1b8731867bc11cf67e1"
    autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]
    subdirs = ["posters", "media", "sessions", "auth_rate_limit", "install_seed"]

    [resources.permissions]
    main.url = "/"

    [resources.apt]
    packages = "php8.4-fpm, php8.4-sqlite3, php8.4-mbstring, php8.4-intl, php8.4-curl, php8.4-zip, poppler-utils"
